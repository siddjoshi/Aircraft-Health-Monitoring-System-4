# Server Configuration
server.port=8080
server.servlet.context-path=/

# Security Configuration
app.security.jwt.secret=mySecretKey1234567890123456789012345678901234567890
app.security.jwt.expiration=86400000

# CORS Configuration - Environment Specific
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001

# Request Size Limits
spring.servlet.multipart.max-request-size=1MB
spring.servlet.multipart.max-file-size=1MB

# JSON Configuration
spring.jackson.deserialization.fail-on-unknown-properties=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Database Configuration (H2 for user management)
spring.datasource.url=jdbc:h2:mem:aircraftdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Logging Configuration
logging.level.com.aircraft.monitoring=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.security=DEBUG

# WebSocket Configuration
spring.websocket.max-text-message-size=8192
spring.websocket.max-binary-message-size=8192

# Application Information
spring.application.name=aircraft-monitoring
spring.application.description=Real-Time Aircraft Health Monitoring System

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always 