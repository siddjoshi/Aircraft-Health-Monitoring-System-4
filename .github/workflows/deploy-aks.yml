name: Build and Deploy to AKS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY_NAME: ${{ secrets.REGISTRY_NAME }}
  CLUSTER_NAME: ${{ secrets.CLUSTER_NAME }}
  CLUSTER_RESOURCE_GROUP: ${{ secrets.CLUSTER_RESOURCE_GROUP }}
  NAMESPACE: default

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    
    - name: Build Backend
      run: |
        cd backend
        mvn clean compile test
    
    - name: Build Frontend
      run: |
        cd frontend
        npm ci
        npm run build
    
    - name: Upload Backend Artifact
      uses: actions/upload-artifact@v3
      with:
        name: backend-build
        path: backend/target/
    
    - name: Upload Frontend Artifact
      uses: actions/upload-artifact@v3
      with:
        name: frontend-build
        path: frontend/build/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Download Backend Artifact
      uses: actions/download-artifact@v3
      with:
        name: backend-build
        path: backend/target/
    
    - name: Download Frontend Artifact
      uses: actions/download-artifact@v3
      with:
        name: frontend-build
        path: frontend/build/
    
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Login to Azure Container Registry
      run: az acr login --name ${{ env.REGISTRY_NAME }}
    
    - name: Build and Push Backend Image
      run: |
        docker build -t ${{ env.REGISTRY_NAME }}.azurecr.io/aircraft-monitoring-backend:${{ github.sha }} ./backend
        docker push ${{ env.REGISTRY_NAME }}.azurecr.io/aircraft-monitoring-backend:${{ github.sha }}
        docker tag ${{ env.REGISTRY_NAME }}.azurecr.io/aircraft-monitoring-backend:${{ github.sha }} ${{ env.REGISTRY_NAME }}.azurecr.io/aircraft-monitoring-backend:latest
        docker push ${{ env.REGISTRY_NAME }}.azurecr.io/aircraft-monitoring-backend:latest
    
    - name: Build and Push Frontend Image
      run: |
        docker build -t ${{ env.REGISTRY_NAME }}.azurecr.io/aircraft-monitoring-frontend:${{ github.sha }} ./frontend
        docker push ${{ env.REGISTRY_NAME }}.azurecr.io/aircraft-monitoring-frontend:${{ github.sha }}
        docker tag ${{ env.REGISTRY_NAME }}.azurecr.io/aircraft-monitoring-frontend:${{ github.sha }} ${{ env.REGISTRY_NAME }}.azurecr.io/aircraft-monitoring-frontend:latest
        docker push ${{ env.REGISTRY_NAME }}.azurecr.io/aircraft-monitoring-frontend:latest
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'
    
    - name: Get AKS credentials
      run: |
        az aks get-credentials --resource-group ${{ env.CLUSTER_RESOURCE_GROUP }} --name ${{ env.CLUSTER_NAME }}
    
    - name: Update Kubernetes manifests
      run: |
        sed -i "s|aircraft-monitoring-backend:latest|${{ env.REGISTRY_NAME }}.azurecr.io/aircraft-monitoring-backend:${{ github.sha }}|g" k8s/backend.yaml
        sed -i "s|aircraft-monitoring-frontend:latest|${{ env.REGISTRY_NAME }}.azurecr.io/aircraft-monitoring-frontend:${{ github.sha }}|g" k8s/frontend.yaml
    
    - name: Deploy to AKS
      run: |
        kubectl apply -f k8s/backend.yaml
        kubectl apply -f k8s/frontend.yaml
        kubectl apply -f k8s/ingress.yaml
    
    - name: Verify deployment
      run: |
        kubectl rollout status deployment/backend-deployment
        kubectl rollout status deployment/frontend-deployment
        kubectl get services
        kubectl get ingress