apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: aircraft-monitoring-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aircraft-monitoring-frontend
  template:
    metadata:
      labels:
        app: aircraft-monitoring-frontend
    spec:
      containers:
      - name: frontend
        image: aircraft-monitoring-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  labels:
    app: aircraft-monitoring-frontend
spec:
  selector:
    app: aircraft-monitoring-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP