apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: aircraft-monitoring-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aircraft-monitoring-backend
  template:
    metadata:
      labels:
        app: aircraft-monitoring-backend
    spec:
      containers:
      - name: backend
        image: aircraft-monitoring-backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "production"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    app: aircraft-monitoring-backend
spec:
  selector:
    app: aircraft-monitoring-backend
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
  type: ClusterIP