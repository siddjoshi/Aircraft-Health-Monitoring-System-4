apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aircraft-monitoring-network-policy
  labels:
    app: aircraft-monitoring
spec:
  podSelector:
    matchLabels:
      app: aircraft-monitoring-backend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from frontend pods
  - from:
    - podSelector:
        matchLabels:
          app: aircraft-monitoring-frontend
    ports:
    - protocol: TCP
      port: 8080
  # Allow traffic from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: TCP
      port: 8080
  egress:
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow HTTPS for external APIs (if needed)
  - to: []
    ports:
    - protocol: TCP
      port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-network-policy
  labels:
    app: aircraft-monitoring
spec:
  podSelector:
    matchLabels:
      app: aircraft-monitoring-frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: TCP
      port: 80
  egress:
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow communication to backend
  - to:
    - podSelector:
        matchLabels:
          app: aircraft-monitoring-backend
    ports:
    - protocol: TCP
      port: 8080